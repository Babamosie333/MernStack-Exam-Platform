<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="View student results in the MCQ admin panel." />
  <title>Results - Admin</title>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Admin Panel</h2>
      <nav aria-label="Admin navigation">
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/subjects.html">Subjects</a>
        <a href="/admin/tests.html">Tests</a>
        <a href="/admin/questions.html">Questions</a>
        <a href="/admin/import.html">Excel Import</a>
        <a href="/admin/results.html" class="active">Results</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div>
          <p class="page-subtitle">Student performance data</p>
          <h1>Student Results</h1>
        </div>
        <button class="btn btn-primary" id="exportBtn">Export CSV</button>
      </header>

      <section class="admin-toolbar results-toolbar" aria-label="Filters">
        <div class="form-group filter-box">
          <label for="subjectFilter">Subject</label>
          <select id="subjectFilter" title="Select Subject">
            <option value="">All</option>
          </select>
        </div>

        <div class="form-group filter-box">
          <label for="testFilter">Chapter</label>
          <select id="testFilter" title="Select Chapter">
            <option value="">All</option>
          </select>
        </div>

        <div class="form-group filter-box">
          <label for="passFilter">Pass/Fail</label>
          <select id="passFilter">
            <option value="">All</option>
            <option value="true">Pass</option>
            <option value="false">Fail</option>
          </select>
        </div>

        <div class="form-group filter-box">
          <label for="searchInput">Search</label>
          <input type="search" id="searchInput" placeholder="Name or phone" />
        </div>

        <div class="form-group filter-box">
          <label for="fromDate">From</label>
          <input type="date" id="fromDate" />
        </div>

        <div class="form-group filter-box">
          <label for="toDate">To</label>
          <input type="date" id="toDate" />
        </div>
      </section>

      <section aria-labelledby="resultsTableTitle">
        <div class="section-heading">
          <h2 id="resultsTableTitle">All submissions</h2>
          <p>Use the filters above to narrow the list.</p>
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Student</th>
                <th>Mobile</th>
                <th>Subject</th>
                <th>Test</th>
                <th>Score</th>
                <th>%</th>
                <th>Pass/Fail</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/results.js"></script>
</body>
</html>
