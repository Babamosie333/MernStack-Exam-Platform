<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam - Online Exam Portal</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="exam-mode">
  <div id="tabWarning" class="tab-warning hidden">Warning: Do not switch tabs during the exam.</div>

  <header class="exam-topbar exam-topbar-premium">
    <div class="exam-topbar-main">
      <div class="exam-heading">
        <span class="section-kicker">Active attempt</span>
        <h1 id="examTitle">Exam</h1>
        <span id="examProgress" class="exam-progress-pill">Q 1/1</span>
      </div>
      <div class="exam-timer-wrap">
        <span class="timer-label">Time Remaining</span>
        <div class="exam-timer" id="timerDisplay">00:00</div>
      </div>
    </div>
  </header>

  <div class="exam-layout">
    <aside class="exam-sidebar exam-sidebar-premium">
      <div class="exam-sidebar-head">
        <h3>Question Map</h3>
        <p>Move quickly between items and keep track of progress.</p>
      </div>
      <div id="questionNav" class="question-nav"></div>
    </aside>

    <main class="exam-main exam-main-premium">
      <div id="alert" aria-live="polite"></div>

      <section class="question-shell">
        <div id="questionArea" class="question-area"></div>
      </section>

      <div class="exam-controls exam-controls-premium">
        <button class="btn btn-secondary" id="prevBtn">Previous</button>
        <button class="btn btn-secondary" id="markBtn">Mark for Review</button>
        <button class="btn btn-secondary" id="nextBtn">Next</button>
        <button class="btn btn-primary" id="submitBtn">Submit Exam</button>
      </div>
    </main>
  </div>

  <script src="/js/student-api.js"></script>
  <script src="/js/exam.js"></script>
</body>
</html>
