<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Manage tests in the MCQ admin panel." />
  <title>Tests - Admin</title>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Admin Panel</h2>
      <nav aria-label="Admin navigation">
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/subjects.html">Subjects</a>
        <a href="/admin/tests.html" class="active">Tests</a>
        <a href="/admin/questions.html">Questions</a>
        <a href="/admin/import.html">Excel Import</a>
        <a href="/admin/results.html">Results</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div>
          <p class="page-subtitle">Test management</p>
          <h1>Tests</h1>
        </div>

        <button class="btn btn-primary" id="addBtn">Add Test</button>
      </header>

      <div id="alert"></div>

      <section aria-labelledby="testsTableTitle">
        <div class="section-heading">
          <h2 id="testsTableTitle">All tests</h2>
          <p>Create tests and connect them to a subject.</p>
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Subject</th>
                <th>Duration</th>
                <th>Questions</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Test</h3>
        <button type="button" class="modal-close" id="cancelBtn" aria-label="Close modal">×</button>
      </div>

      <form id="testForm">
        <input type="hidden" id="testId" />

        <div class="form-group">
          <label for="subjectId">Subject</label>
          <select id="subjectId" required></select>
        </div>

        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" required />
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="durationMinutes">Duration (minutes)</label>
          <input type="number" id="durationMinutes" min="1" value="30" required />
        </div>

        <div class="form-group">
          <label for="totalMarks">Total Marks</label>
          <input type="number" id="totalMarks" min="0" value="0" />
        </div>

        <div class="form-group">
          <label for="passingMarks">Passing Marks</label>
          <input type="number" id="passingMarks" min="0" value="0" />
        </div>

        <div class="form-group checkbox-group">
          <label for="isActive">
            <input type="checkbox" id="isActive" checked />
            Active
          </label>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtnBottom">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/tests.js"></script>
</body>
</html>
