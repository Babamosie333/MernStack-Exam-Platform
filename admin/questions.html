<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Manage questions in the MCQ admin panel." />
  <title>Questions - Admin</title>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Admin Panel</h2>
      <nav aria-label="Admin navigation">
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/subjects.html">Subjects</a>
        <a href="/admin/tests.html">Tests</a>
        <a href="/admin/questions.html" class="active">Questions</a>
        <a href="/admin/import.html">Excel Import</a>
        <a href="/admin/results.html">Results</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div>
          <p class="page-subtitle">Manage question bank</p>
          <h1>Questions</h1>
        </div>

        <button class="btn btn-primary" id="addBtn" disabled>Add Question</button>
      </header>

      <section class="admin-toolbar">
        <div class="form-group test-picker">
          <label for="testSelect">Select Test</label>
          <select id="testSelect" title="Select Test"></select>
        </div>
      </section>

      <div id="alert"></div>
      <div id="questionsList" class="questions-list"></div>
    </main>
  </div>

  <div id="modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Question</h3>
        <button type="button" class="modal-close" id="cancelBtn" aria-label="Close modal">×</button>
      </div>

      <form id="questionForm">
        <input type="hidden" id="questionId" />

        <div class="form-group">
          <label for="questionText">Question</label>
          <textarea id="questionText" rows="3" required></textarea>
        </div>

        <div class="question-options">
          <div class="form-group">
            <label for="optA">Option A</label>
            <input type="text" id="optA" required />
          </div>
          <div class="form-group">
            <label for="optB">Option B</label>
            <input type="text" id="optB" required />
          </div>
          <div class="form-group">
            <label for="optC">Option C</label>
            <input type="text" id="optC" required />
          </div>
          <div class="form-group">
            <label for="optD">Option D</label>
            <input type="text" id="optD" required />
          </div>
        </div>

        <div class="modal-grid">
          <div class="form-group">
            <label for="correctOption">Correct Option</label>
            <select id="correctOption" required>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>

          <div class="form-group">
            <label for="marks">Marks</label>
            <input type="number" id="marks" min="0" value="1" required />
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtnBottom">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/questions.js"></script>
</body>
</html>
