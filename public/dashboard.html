<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard - Online Exam Portal</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="portal-header">
    <div class="container portal-topbar">
      <div class="brand">
        <span class="brand-mark">OE</span>
        <span class="brand-text">Online Exam Portal</span>
      </div>
      <div class="portal-actions">
        <a href="/history.html" class="btn btn-secondary btn-sm">My Results</a>
        <button class="btn btn-secondary btn-sm" id="logoutBtn">Logout</button>
      </div>
    </div>
  </header>

  <main class="container" id="mainContent">
    <section class="welcome-block">
      <h1 id="welcomeText">Welcome</h1>
      <p>Select a subject to view available tests.</p>
    </section>
    <div id="alert"></div>
    <div id="subjectsGrid" class="subject-grid"></div>
  </main>

  <script src="/js/student-api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
