<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin login for the MCQ Test Platform." />
  <title>Admin Login - MCQ Platform</title>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body class="login-page">
  <main class="login-shell">
    <div class="login-box">
      <div class="login-brand">
        <span class="brand-mark">VS</span>
        <div>
          <h1>Admin Login</h1>
          <p class="subtitle">MCQ Test Platform</p>
        </div>
      </div>

      <div id="alert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>

      <p class="login-back">
        <a href="/">← Back to student site</a>
      </p>
    </div>
  </main>

  <script src="/admin/js/admin-api.js"></script>
  <script>
    checkAuth().then((admin) => {
      if (admin) window.location.href = '/admin/dashboard.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      alertEl.innerHTML = '';

      try {
        const data = await apiRequest('/api/admin/login', {
          method: 'POST',
          body: {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          },
        });
        if (data.token) localStorage.setItem('adminToken', data.token);
        window.location.href = '/admin/dashboard.html';
      } catch (err) {
        showAlert(alertEl, err.message);
      }
    });
  </script>
</body>
</html>
