<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Exam Portal - Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-wrap">
    <div class="auth-brand">
      <span class="brand-mark">OE</span>
      <h1>Online Exam Portal</h1>
      <p>Register or sign in with your phone number to take exams and view results.</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">Login</button>
        <button type="button" class="auth-tab" data-tab="register">Register</button>
      </div>

      <div id="alert"></div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="loginPhone">Phone</label>
          <input type="tel" id="loginPhone" required placeholder="10-digit phone" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" required />
        </div>
        <div class="form-group">
          <label for="regPhone">Phone</label>
          <input type="tel" id="regPhone" required placeholder="Unique phone number" />
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" required minlength="6" />
        </div>
        <div class="form-group">
          <label for="regConfirm">Confirm Password</label>
          <input type="password" id="regConfirm" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <p class="auth-back">
        <a href="/">← Back to home</a>
      </p>
    </div>
  </div>

  <script src="/js/student-api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
